name: MLOps Pipeline
on: 
  push:
    branches-ignore:
      - main  # Runs on all branches except main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt 
          pip install dvc

      - name: Configure DVC for DagsHub
        run: |
          # Configure DVC remote for DagsHub (if not already in .dvc/config)
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Set up DVC remote using the repository URL
          dvc remote add origin https://dagshub.com/${{ github.repository }}.dvc 2>/dev/null || true
          dvc remote default origin 2>/dev/null || true
          
          # Set authentication for the pull step
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ github.actor }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_PAT }}
          
          # Verify configuration
          echo "DVC remotes configured:"
          dvc remote list

      - name: Pull Data
        run: |
          # Pull DVC-tracked data
          dvc pull
          
          # List pulled files for debugging
          echo "Files after dvc pull:"
          ls -la
      - name: Debug DVC Setup
        run: |
          echo "Current directory contents:"
          ls -la
          echo "DVC files:"
          find . -name "*.dvc" -type f
          echo "DVC config:"
          cat .dvc/config 2>/dev/null || echo "No .dvc/config found"
          echo "DVC remote list:"
          dvc remote list    

      - name: Train and Observe
        run: python train.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_PAT }}

      - name: Persist Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model_metadata
          path: |
            model_info.txt
            accuracy_result.txt
          retention-days: 30

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: model_metadata

      - name: Check Threshold Logic
        run: python check_threshold.py

      - name: Containerize
        if: success()
        run: |
          if [ -f model_info.txt ]; then
            RUN_ID=$(cat model_info.txt)
            echo "Building Docker image for Run ID: $RUN_ID"
            docker build --build-arg RUN_ID=$RUN_ID -t ml-model-service:latest .
          else
            echo "Error: model_info.txt not found"
            exit 1
          fi