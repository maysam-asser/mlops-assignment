name: MLOps Pipeline

on:
  push:
    branches-ignore:
      - main  # Runs on all branches except main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true  # Important for DVC

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn numpy dvc mlflow

      - name: Configure DVC
        run: |
          dvc remote default origin
          # For local development, just pull from local cache
          # In production, you'd set up remote storage

      - name: Pull Data with DVC
        # Requirement: Uses dvc pull
        run: |
          dvc pull || echo "No remote data to pull, using local cache"

      - name: Train and Observe
        # Requirement: Logs to MLflow Tracking Server using a secret
        run: python train.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Persist Artifacts
        # Requirement: Use actions/upload-artifact@v4 to save model_info.txt
        uses: actions/upload-artifact@v4
        with:
          name: model_metadata
          path: |
            model_info.txt
            accuracy_result.txt

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        # Requirement: Use actions/download-artifact@v4
        uses: actions/download-artifact@v4
        with:
          name: model_metadata

      - name: Install Python for threshold check
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install MLflow for threshold check
        run: pip install mlflow

      - name: Check Threshold Logic
        # Requirement: Run check_threshold.py (Fails if accuracy < 0.85)
        run: python check_threshold.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Containerize
        # Requirement: Run Mock Build and Docker Build
        if: success()
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID=$RUN_ID -t ml-model-service:latest .