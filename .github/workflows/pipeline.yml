name: MLOps Pipeline

on: 
  push:
    branches-ignore:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn numpy dvc mlflow

      - name: Pull Data
        run: dvc pull || echo "Data pulled from local cache."

      - name: Train and Observe
        run: python train.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Persist Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model_metadata
          path: |
            model_info.txt
            accuracy_result.txt

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: model_metadata

      - name: Check Threshold Logic
        run: python check_threshold.py

      - name: Containerize
        if: success()
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID=$RUN_ID -t ml-model-service:latest .