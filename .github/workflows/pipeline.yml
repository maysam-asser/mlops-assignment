name: MLOps Real Pipeline
on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      
      - name: Install dependencies
        run: pip install mlflow dvc dvc-s3 pandas scikit-learn

      - name: Pull Data from DVC
        env:
          DVC_USER: ${{ secrets.DAGSHUB_USERNAME }}
          DVC_PASS: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote add -d storage https://dagshub.com/maysam-asser/mlops-assignment.dvc
          dvc remote modify storage auth basic
          dvc remote modify storage user $DVC_USER
          dvc remote modify storage password $DVC_PASS
          dvc pull -r storage

      - name: Train Model
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python train.py

      - name: Save Run ID
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Run ID
        uses: actions/download-artifact@v4
        with: {name: model_info}
      
      - name: Install MLflow
        run: pip install mlflow
        
      - name: Check Threshold
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python check_threshold.py

      - name: Mock Build
        run: echo "Building Docker image for Run ID: $(cat model_info.txt)"