name: MLOps Pipeline

on:
  push:
    branches-ignore:
      - main  

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn numpy dvc mlflow
      
      - name: Configure DVC
        run: |
          dvc remote add -f myremote https://your-dvc-remote-url
          # If using DVC with remote storage like S3/GCS, configure credentials here
          # Or if using local remote in repo, adjust accordingly
      
      - name: Pull Data with DVC
        run: dvc pull
      
      - name: Train Model with MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train.py
      
      - name: Export Run ID
        run: |
          # Assuming train.py creates or updates model_info.txt with the MLflow Run ID
          # If not, we need to capture the Run ID from the training script output
          if [ ! -f model_info.txt ]; then
            echo "Error: model_info.txt not found"
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline_data
          path: "model_info.txt"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pipeline_data
      
      - name: Install MLflow
        run: pip install mlflow
      
      - name: Check Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py
      
      - name: Mock Build
        run: |
          RID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RID"
          # Optional: uncomment to build actual Docker image
          # docker build --build-arg RUN_ID=$RID -t model-run-$RID .